<!DOCTYPE html>
<html>
<head>
<title>Hobo Series</title>
<style>
body { margin: 0; background: black; overflow: hidden; color: white; font-family: sans-serif; }
#player, ruffle-player { width: 100vw; height: 100vh; display: block; }
#menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
button { margin: 5px; padding: 10px 20px; font-size: 18px; cursor: pointer; }
</style>
<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>
<body>
<div id="menu">
    <h1>Hobo Series</h1>
    <button onclick="location.hash='#/hobo1'">Hobo 1: Brawl</button>
    <button onclick="location.hash='#/hobo2'">Hobo 2: Prison Brawl</button>
    <button onclick="location.hash='#/hobo3'">Hobo 3: Wanted</button>
    <button onclick="location.hash='#/hobo4'">Hobo 4: Total War</button>
    <button onclick="location.hash='#/hobo5'">Hobo 5: Space Brawls</button>
    <button onclick="location.hash='#/hobo6'">Hobo 6: Hell</button>
    <button onclick="location.hash='#/hobo7'">Hobo 7: Heaven</button>
</div>
<div id="player" style="display: none;"></div>
<script>
let rufflePlayer = null;

function loadGame() {
    const hash = window.location.hash.replace('#/', '');
    const menu = document.getElementById('menu');
    const playerDiv = document.getElementById('player');

    if (!hash) {
        menu.style.display = 'flex';
        playerDiv.style.display = 'none';
        if (rufflePlayer) {
            playerDiv.innerHTML = '';
            rufflePlayer = null;
        }
        return;
    }

    menu.style.display = 'none';
    playerDiv.style.display = 'block';

    const ruffle = window.RufflePlayer.newest();
    rufflePlayer = ruffle.createPlayer();
    playerDiv.appendChild(rufflePlayer);
    
    rufflePlayer.load({
        url: hash + '.swf',
        scale: "showAll",
        letterbox: "on"
    });

    setTimeout(() => rufflePlayer.focus(), 100);
}

window.addEventListener("hashchange", loadGame);
window.addEventListener("load", loadGame);

window.addEventListener("keydown", (e) => {
    if (e.key === "F11") {
        e.stopPropagation();
    }
}, true);
</script>
</body>
</html>
